syntax = "proto3";
option java_package = "com.tron.bridge";

package bridge;

message GetFriendsRequest {
    string username = 1;
}

message GetFriendsResponse {
    repeated string friends = 1;
}

message ListFriendsRequest {
    string username = 1;
}

message ListFriendsResponse {
    repeated string friends = 1;
}

message SendFriendRequestRequest {
    string sender = 1;
    string receiver = 2;
}

message SendFriendRequestResponse {
    bool success = 1;
}

message AcceptFriendRequestRequest {
    string username = 1;
    string sender = 2;
}

message AcceptFriendRequestResponse {
    bool success = 1;
}

message RejectFriendRequestRequest {
    string username = 1;
    string sender = 2;
}

message RejectFriendRequestResponse {
    bool success = 1;
}

message GetFriendRequestsRequest {
    string username = 1;
}

message GetFriendRequestsResponse {
    map<string, uint64> incoming_friend_requests = 1;
}

message ListFriendRequestsRequest {
    string username = 1;
}

message ListFriendRequestsResponse {
    map<string, uint64> incoming_friend_requests = 1;
}

message RemoveFriendRequest {
    string username = 1;
    string target = 2;
}

message RemoveFriendResponse {
    bool success = 1;
}


message RemoveTeamMemberRequest {
    string username = 1;
    string target = 2;
}

message RemoveTeamMemberResponse {
    bool success = 1;
}
