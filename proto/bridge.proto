syntax = "proto3";
option java_package = "com.tron.bridge";
option java_outer_classname = "BridgeProto";

package bridge;

import "session.proto";
import "balance.proto";
import "leaderboard.proto";
import "friends.proto";
import "teams.proto";
import "shop.proto";
import "player.proto";
import "server.proto";
import "security.proto";
import "prefix.proto";

service Bridge {
    // Session
    rpc PlayerJoin (PlayerJoinRequest) returns (PlayerJoinResponse);
    rpc PlayerLeave (PlayerLeaveRequest) returns (PlayerLeaveResponse);

    // Balance
    rpc GetBalance (GetBalanceRequest) returns (GetBalanceResponse);
    rpc TransferBalance (TransferBalanceRequest) returns (TransferBalanceResponse);

    // Leaderboard
    rpc OverallLeaderboard (OverallLeaderboardRequest) returns (OverallLeaderboardResponse);
    rpc CoinsLeaderboard (CoinsLeaderboardRequest) returns (CoinsLeaderboardResponse);
    rpc TeamsLeaderboard (TeamsLeaderboardRequest) returns (TeamsLeaderboardResponse);
    rpc KdaLeaderboard (KdaLeaderboardRequest) returns (KdaLeaderboardResponse);
    rpc DeathsLeaderboard (DeathsLeaderboardRequest) returns (DeathsLeaderboardResponse);
    rpc KillsLeaderboard (KillsLeaderboardRequest) returns (KillsLeaderboardResponse);

    // Messaging

    // Friends
    rpc GetFriends (GetFriendsRequest) returns (GetFriendsResponse);
    rpc ListFriends (ListFriendsRequest) returns (ListFriendsResponse);
    rpc SendFriendRequest (SendFriendRequestRequest) returns (SendFriendRequestResponse);
    rpc AcceptFriendRequest (AcceptFriendRequestRequest) returns (AcceptFriendRequestResponse);
    rpc RejectFriendRequest (RejectFriendRequestRequest) returns (RejectFriendRequestResponse);
    rpc GetFriendRequests (GetFriendRequestsRequest) returns (GetFriendRequestsResponse);
    rpc ListFriendRequests (ListFriendRequestsRequest) returns (ListFriendRequestsResponse);
    rpc RemoveFriend (RemoveFriendRequest)  returns (RemoveFriendResponse);

    // Teams
    rpc CreateTeam (CreateTeamRequest) returns (CreateTeamResponse);
    rpc DeleteTeam (DeleteTeamRequest) returns (DeleteTeamResponse);
    rpc LeaveTeam (LeaveTeamRequest) returns (LeaveTeamResponse);
    rpc JoinTeam (JoinTeamRequest) returns (JoinTeamResponse);
    rpc SendTeamInvite (SendTeamInviteRequest) returns (SendTeamInviteResponse);
    rpc AcceptTeamInvite (AcceptTeamInviteRequest) returns (AcceptTeamInviteResponse);
    rpc RejectTeamInvite (RejectTeamInviteRequest) returns (RejectTeamInviteResponse);
    rpc GetTeamMembers (GetTeamMembersRequest) returns (GetTeamMembersResponse);
    rpc RemoveTeamMember (RemoveTeamMemberRequest) returns (RemoveTeamMemberResponse);
    rpc PromoteTeamMember (PromoteTeamMemberRequest) returns (PromoteTeamMemberResponse);
    rpc GetOpenTeams (GetOpenTeamsRequest) returns (GetOpenTeamsResponse);
    rpc GetAllTeams (GetAllTeamsRequest) returns (GetAllTeamsResponse);

    // Shop
    rpc BuyItem (BuyItemRequest) returns (BuyItemResponse);
    rpc SellItem (SellItemRequest) returns (SellItemResponse);
    rpc GetItems (GetItemsRequest) returns (GetItemsResponse);

    // Prefix
    rpc BuyPrefix(BuyPrefixRequest) returns (BuyPrefixResponse);
    rpc EquipPrefix(EquipPrefixRequest) returns (EquipPrefixResponse);
    rpc GetAllPrefix(GetAllPrefixRequest) returns (GetAllPrefixResponse);
    rpc ListAllPrefix(ListAllPrefixRequest) returns (ListAllPrefixResponse);
    rpc GetOwnedPrefix(GetOwnedPrefixRequest) returns (GetOwnedPrefixResponse);
    rpc ListOwnedPrefix(ListOwnedPrefixRequest) returns (ListOwnedPrefixResponse);
    rpc GetCurrentPrefix(GetCurrentPrefixRequest) returns (GetCurrentPrefixResponse);
    rpc CreatePrefix(CreatePrefixRequest) returns (CreatePrefixResponse);
    rpc DeletePrefix(DeletePrefixRequest) returns (DeletePrefixResponse);
    rpc UnEquipPrefix(UnEquipPrefixRequest) returns (UnEquipPrefixResponse);

    // Player
    rpc PlayerDeath(PlayerDeathRequest) returns (PlayerDeathResponse);
    rpc PlayerKill(PlayerKillRequest) returns (PlayerKillResponse);
    rpc PlayerPlaceBlock(PlayerPlaceBlockRequest) returns (PlayerPlaceBlockResponse);
    rpc PlayerBreakBlock(PlayerBreakBlockRequest) returns (PlayerBreakBlockResponse);

    // Server
    rpc ProxyStartup(ProxyStartupRequest) returns (ProxyStartupResponse);
    rpc ProxyShutdown(ProxyShutdownRequest) returns (ProxyShutdownResponse);
    rpc SurvivalStartup(SurvivalStartupRequest) returns (SurvivalStartupResponse);
    rpc SurvivalShutdown(SurvivalShutdownRequest) returns (SurvivalShutdownResponse);
    rpc LobbyStartup(LobbyStartupRequest) returns (LobbyStartupResponse);
    rpc LobbyShutdown(LobbyShutdownRequest) returns (LobbyShutdownResponse);
    rpc ServerSendMessage(ServerSubscribeRequest) returns (stream ServerSendMessageResponse);
    rpc ServerSendTitle(ServerSubscribeRequest) returns (stream ServerSendTitleResponse);
    rpc Message(stream MessageRequest) returns (stream MessageResponse);
    rpc IncreaseCoins(IncreaseCoinsRequest) returns (IncreaseCoinsResponse);

    // Security
    rpc ReportPlayer(ReportPlayerRequest) returns (ReportPlayerResponse);
}
