syntax = "proto3";

package bridge;

import "common.proto";

message GetItemsRequest {
    string username = 1;
}

message GetItemsResponse {
    repeated ShopItem items = 1;
}

message BuyItemRequest {
    string username = 1;
    uint64 item = 2;
}

message BuyItemResponse {
    ShopItem item = 1;
}

message SellItem {
    string item_type = 1;
    uint64 quantity = 2;
    repeated string enchantments = 3;
}

message SellItemRequest {
    string username = 1;
    repeated SellItem items = 2;
}

message SellItemResponse {
    uint64 price = 1;
}
