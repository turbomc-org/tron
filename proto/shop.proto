syntax = "proto3";
option java_package = "com.tron.bridge";

package bridge;

import "common.proto";

message GetAllItemsRequest {
    string username = 1;
}

message GetAllItemsResponse {
    repeated ShopItem items = 1;
}

message ListAllItemsRequest {
    string username = 1;
}

message ListAllItemsResponse {
    bool success = 1;
}

message GetItemRequest {
    string username = 1;
    uint64 id = 2;
}

message GetItemResponse {
    ShopItem item = 1;
}

message ViewItemRequest {
    string username = 1;
    uint64 id = 2;
}

message ViewItemResponse {
    ShopItem item = 1;
}

message BuyItemRequest {
    string username = 1;
    uint64 item = 2;
}

message BuyItemResponse {
    ShopItem item = 1;
}

message SellItem {
    string item_type = 1;
    uint64 quantity = 2;
    repeated string enchantments = 3;
}

message SellItemRequest {
    string username = 1;
    repeated SellItem items = 2;
}

message SellItemResponse {
    uint64 price = 1;
}

message CreateShopItemRequest {
    string name = 1;
    string description = 2;
    uint64 price = 3;
    string item_id = 4;
}

message CreateShopItemResponse {
    ShopItem item = 1;
}

message DeleteShopItemRequest {
    uint64 id = 1;
}

message DeleteShopItemResponse {
    bool success = 1;
}
