syntax = "proto3";
option java_package = "com.tron.bridge";

package bridge;

import "common.proto";

message GetBugRequest {
    string username = 1;
    uint64 bug_id = 2;
}

message GetBugResponse {
    Bug bug = 1;
}

message ViewBugRequest {
    string username = 1;
    uint64 bug_id = 2;
}

message ViewBugResponse {
    bool success = 1;
}

message BugRequest {
    string username = 1;
    string description = 2;
}

message BugResponse {
    bool success = 1;
}

message GetAllBugsRequest {
    string username = 1;
}

message GetAllBugsResponse {
    repeated uint64 ids = 1;
}

message ListAllBugsRequest {
    string username = 1;
}

message ListAllBugsResponse {
    bool success = 1;
}

message DeleteBugRequest {
    string username = 1;
    uint64 bug_id = 2;
}

message DeleteBugResponse {
    bool success = 1;
}
