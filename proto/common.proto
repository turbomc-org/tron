syntax = "proto3";
option java_package = "com.tron.bridge";

package bridge;

message ShopItem {
  uint64 id = 1;
  string type_id = 2;
  repeated string enchantments = 3;
  string name = 4;
  string description = 5;
  string category = 6;
  uint64 buy_price = 7;
  uint64 sell_price = 8;
  Rarity rarity = 9;
}

enum Rarity {
  COMMON = 0;
  UNCOMMON = 1;
  RARE = 2;
  EPIC = 3;
  LEGENDARY = 4;
}

message PartialPrefix {
    string text = 1;
    string color = 2;
    uint64 price = 3;
}

enum Rank {
    NEWBIE = 0;
    MEMBER = 1;
    VIP = 2;
    ELITE = 3;
    LEGEND = 4;
}


message Server {
    uint64 id = 1;
    string name = 2;
    string description = 3;
    string address= 4;
}

message Report {
    uint64 id = 1;
    string username = 2;
    string target_username = 3;
    string reason = 4;
}

message Bug {
    uint64 id = 1;
    string username = 2;
    string description = 3;
}
