syntax = "proto3";
option java_package = "com.tron.bridge";

package bridge;
import "common.proto";

message ListAllServersRequest {
    string username = 1;
}

message ListAllServersResponse {
    repeated string names = 1;
}

message GetAllServersRequest {
    string username = 1;
}

message GetAllServersResponse {
    repeated string names = 1;
}

message GetServerRequest {
    string username = 1;
}

message GetServerResponse {
    Server server = 1;
}

message ViewServerRequest {
    string username = 1;
    string name = 2;
}

message ViewServerResponse {
    bool success = 1;
}

message CreateServerRequest {
    string username = 1;
    string name = 2;
    string description = 3;
    string address = 4;
}

message CreateServerResponse {
    bool success = 1;
}

message DeleteServerRequest {
    string username = 1;
    string name = 2;
}

message DeleteServerResponse {
    bool success = 1;
}

message ProxyStartupRequest {}
message ProxyStartupResponse {
    uint64 client_id = 1;
}

message ProxyShutdownRequest {
    uint64 client_id = 1;
}
message ProxyShutdownResponse {
    bool success = 1;
}

message SurvivalStartupRequest {
}
message SurvivalStartupResponse {
    uint64 client_id = 1;
}

message SurvivalShutdownRequest {
    uint64 client_id = 1;
}
message SurvivalShutdownResponse {
    bool success = 1;
}

message LobbyStartupRequest {
}
message LobbyStartupResponse {
    uint64 client_id = 1;
}

message LobbyShutdownRequest {
    uint64 client_id = 1;
}
message LobbyShutdownResponse {
    bool success = 1;
}

message IncreaseCoinsRequest {
    string username = 1;
    string target = 2;
    int64 amount = 3;
}

message IncreaseCoinsResponse {
    bool success = 1;
}
