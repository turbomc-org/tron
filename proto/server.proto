syntax = "proto3";
option java_package = "com.tron.bridge";

package bridge;

message ProxyStartupRequest {}
message ProxyStartupResponse {
    uint64 client_id = 1;
}

message ProxyShutdownRequest {
    uint64 client_id = 1;
}
message ProxyShutdownResponse {
    bool success = 1;
}

message SurvivalStartupRequest {
}
message SurvivalStartupResponse {
    uint64 client_id = 1;
}

message SurvivalShutdownRequest {
    uint64 client_id = 1;
}
message SurvivalShutdownResponse {
    bool success = 1;
}

message LobbyStartupRequest {
}
message LobbyStartupResponse {
    uint64 client_id = 1;
}

message LobbyShutdownRequest {
    uint64 client_id = 1;
}
message LobbyShutdownResponse {
    bool success = 1;
}

message IncreaseCoinsRequest {
    string username = 1;
    string target = 2;
    int64 amount = 3;
}

message IncreaseCoinsResponse {
    bool success = 1;
}

message ServerSendMessageResponse {
    string username = 1;
    string message = 2;
    uint64 timestamp = 4;
}

message ServerSubscribeRequest {
    uint64 client_id = 1;
}

message ServerSendTitleResponse {
    enum Type {
        ACHIEVEMENT = 0;
        WARNING = 1;
        AWARD = 2;
    }

    string username = 1;
    string title = 2;
    string sub_title = 3;
    Type title_type = 4;
    uint64 timestamp = 5;
}

message MessageRequest {
    string username = 1;
    string message = 2;
}

message MessageResponse {
    string username = 1;
    string message = 2;
    string prefix = 3;
    string badges = 4;
    string team = 5;
    uint64 timestamp = 6;
}

message ServerKickPlayerRequest {
    string client_id = 1;
}

message ServerKickPlayerResponse {
    string username = 1;
    uint64 timestamp = 2;
}

message ServerBanPlayerRequest {
    string client_id = 1;
}

message ServerBanPlayerResponse {
    string username = 1;
    uint64 timestamp = 3;
}
