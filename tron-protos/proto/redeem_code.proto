syntax = "proto3";
option java_package = "com.tron.bridge";

package bridge;
import "common.proto";

message RedeemCodeRequest {
    string username = 1;
    string code = 2;
}

message RedeemCodeResponse {
    bool success = 1;
}

message CreateRedeemCodeRequest {
  string username = 1;
  string code = 2;
  uint64 expires_at = 3;
  RedeemType reward = 4;
}

message CreateRedeemCodeResponse {
  bool success = 1;
}

message DeleteRedeemCodeRequest {
    string username = 1;
    string code = 2;
}

message DeleteRedeemCodeResponse {
    bool success = 1;
}

message GetAllRedeemCodesRequest {
    string username = 1;
}

message GetAllRedeemCodesResponse {
    repeated string codes = 1;
}

message ListAllRedeemCodesRequest {
    string username = 1;
}

message ListAllRedeemCodesResponse {
    bool success = 1;
}

message ViewRedeemCodeRequest {
    string username = 1;
    string code = 2;
}

message ViewRedeemCodeResponse {
    bool success = 1;
}
