syntax = "proto3";
option java_package = "com.tron.bridge";

package bridge;

message GetAllTeamsRequest  {
    string username = 1;
}

message GetAllTeamsResponse {
    repeated string teams = 1;
}

message GetOpenTeamsRequest {
    string username = 1;
}

message GetOpenTeamsResponse {
    repeated string teams = 1;
}

message GetTeamMembersRequest {
    string username = 1;
}

message GetTeamMembersResponse {
    repeated string members = 1;
}

message GetTeamRequestsRequest {
    string username = 1;
}

message GetTeamRequestsResponse {
    repeated string teams = 1;
}

message ListTeamMembersRequest {
    string username = 1;
}

message ListTeamMembersResponse {
    bool success = 1;
}

message ListTeamRequestsRequest {
    string username = 1;
}

message ListTeamRequestsResponse {
    bool success = 1;
}

message ListOpenTeamsRequest {
    string username = 1;
}

message ListOpenTeamsResponse {
    bool success = 1;
}

message CreateTeamRequest {
    string username = 1;
    string team = 2;
    string color = 3;
    bool open = 4;
}

message CreateTeamResponse {
    bool success = 1;
}

message LeaveTeamRequest {
    string username = 1;
}

message LeaveTeamResponse {
    bool success = 1;
}

message JoinTeamRequest {
    string username = 1;
    string team = 2;
}

message JoinTeamResponse {
    bool success = 1;
}

message SendTeamInviteRequest {
    string username = 1;
    string target = 2;
}

message SendTeamInviteResponse {
    bool success = 1;
}

message AcceptTeamInviteRequest {
    string username = 1;
    string team = 2;
}

message AcceptTeamInviteResponse {
    bool success = 1;
}

message RejectTeamInviteRequest {
    string username = 1;
    string team = 2;
}

message RejectTeamInviteResponse {
    bool success = 1;
}

message PromoteTeamMemberRequest {
    string username = 1;
    string target = 2;
}

message PromoteTeamMemberResponse {
    bool success = 1;
}

message DeleteTeamRequest {
    string username = 1;
    string team_name = 2;
}

message DeleteTeamResponse {
    bool success = 1;
}

message ListTeamsRequest {
    string username = 1;
}

message ListTeamsResponse {
    bool success = 1;
}
