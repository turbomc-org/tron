syntax = "proto3";
option java_package = "com.tron.bridge";

package bridge;

message ProxyConnectionRequest {
  oneof payload {
    Heartbeat heartbeat = 1;
    Handshake handshake = 2;
    EmitMessage emit_message = 3;
    EmitWhisper emit_whisper = 4;
  }
}

message Handshake {}

message EmitMessage {
    string username = 1;
    string message = 2;
}

message EmitWhisper {
    string username = 1;
    string target = 2;
    string message = 3;
}

message Heartbeat {
  int64 timestamp = 2;
  repeated string players = 3;
}

message ProxyConnectionResponse {
  oneof command {
    TransferPlayer transfer = 1;
    BanPlayer ban = 2;
    PardonPlayer pardon = 3;
    KickPlayer kick = 4;
    MessagePlayer message = 5;
    TitlePlayer title = 6;
    ServerOffline offline = 7;
  }
}

message ProxyServer {
  uint64 id = 1;
  string name = 2;
  string motd = 3;
  string address = 4;
}

message TransferPlayer {
  string username = 1;
  ProxyServer server = 2;
}

message KickPlayer {
  string username = 1;
  string reason = 2;
}

message BanPlayer {
    string username = 1;
    string reason = 2;
}

message PardonPlayer {
    string username = 1;
}

message MessagePlayer {
  string username = 1;
  string message = 2;
}

message TitlePlayer {
    string username = 1;
    string title = 2;
    string subtitle = 3;
}

message ServerOffline {
  string server_id = 1;
}
