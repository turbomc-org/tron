syntax = "proto3";
option java_package = "com.tron.bridge";
option java_outer_classname = "BridgeProto";

package bridge;

import "session.proto";
import "balance.proto";
import "leaderboard.proto";
import "friends.proto";
import "teams.proto";
import "shop.proto";
import "player.proto";
import "servers.proto";
import "prefix.proto";
import "proxy.proto";
import "redeem_code.proto";
import "bug_report.proto";
import "scoreboard.proto";
import "chat.proto";
import "perms.proto";
import "player_report.proto";

service Bridge {
    // Proxy
    rpc ProxyConnection (stream ProxyConnectionRequest) returns (stream ProxyConnectionResponse);

    // Session
    rpc PlayerLogin(PlayerLoginRequest) returns (PlayerLoginResponse);
    rpc PlayerPostLogin (PlayerPostLoginRequest) returns (PlayerPostLoginResponse);
    rpc PlayerLogout(PlayerLogoutRequest) returns (PlayerLogoutResponse);

    // Balance
    rpc GetBalance (GetBalanceRequest) returns (GetBalanceResponse);
    rpc TransferBalance (TransferBalanceRequest) returns (TransferBalanceResponse);

    // Leaderboard
    rpc OverallLeaderboard (OverallLeaderboardRequest) returns (OverallLeaderboardResponse);
    rpc CoinsLeaderboard (CoinsLeaderboardRequest) returns (CoinsLeaderboardResponse);
    rpc TeamsLeaderboard (TeamsLeaderboardRequest) returns (TeamsLeaderboardResponse);
    rpc KdaLeaderboard (KdaLeaderboardRequest) returns (KdaLeaderboardResponse);
    rpc DeathsLeaderboard (DeathsLeaderboardRequest) returns (DeathsLeaderboardResponse);
    rpc KillsLeaderboard (KillsLeaderboardRequest) returns (KillsLeaderboardResponse);
    rpc ListOverallLeaderboard (ListOverallLeaderboardRequest) returns (ListOverallLeaderboardResponse);
    rpc ListKdaLeaderboard (ListKdaLeaderboardRequest) returns (ListKdaLeaderboardResponse);
    rpc ListKillsLeaderboard (ListKillsLeaderboardRequest) returns (ListKillsLeaderboardResponse);
    rpc ListDeathsLeaderboard (ListDeathsLeaderboardRequest) returns (ListDeathsLeaderboardResponse);
    rpc ListCoinsLeaderboard (ListCoinsLeaderboardRequest) returns (ListCoinsLeaderboardResponse);
    rpc ListTeamsLeaderboard (ListTeamsLeaderboardRequest) returns (ListTeamsLeaderboardResponse);

    // Friends
    rpc GetFriends (GetFriendsRequest) returns (GetFriendsResponse);
    rpc ListFriends (ListFriendsRequest) returns (ListFriendsResponse);
    rpc SendFriendRequest (SendFriendRequestRequest) returns (SendFriendRequestResponse);
    rpc AcceptFriendRequest (AcceptFriendRequestRequest) returns (AcceptFriendRequestResponse);
    rpc RejectFriendRequest (RejectFriendRequestRequest) returns (RejectFriendRequestResponse);
    rpc GetFriendRequests (GetFriendRequestsRequest) returns (GetFriendRequestsResponse);
    rpc ListFriendRequests (ListFriendRequestsRequest) returns (ListFriendRequestsResponse);
    rpc RemoveFriend (RemoveFriendRequest)  returns (RemoveFriendResponse);

    // Teams
    rpc CreateTeam (CreateTeamRequest) returns (CreateTeamResponse);
    rpc DeleteTeam (DeleteTeamRequest) returns (DeleteTeamResponse);
    rpc LeaveTeam (LeaveTeamRequest) returns (LeaveTeamResponse);
    rpc JoinTeam (JoinTeamRequest) returns (JoinTeamResponse);
    rpc SendTeamInvite (SendTeamInviteRequest) returns (SendTeamInviteResponse);
    rpc AcceptTeamInvite (AcceptTeamInviteRequest) returns (AcceptTeamInviteResponse);
    rpc RejectTeamInvite (RejectTeamInviteRequest) returns (RejectTeamInviteResponse);
    rpc GetTeamMembers (GetTeamMembersRequest) returns (GetTeamMembersResponse);
    rpc RemoveTeamMember (RemoveTeamMemberRequest) returns (RemoveTeamMemberResponse);
    rpc PromoteTeamMember (PromoteTeamMemberRequest) returns (PromoteTeamMemberResponse);
    rpc GetOpenTeams (GetOpenTeamsRequest) returns (GetOpenTeamsResponse);
    rpc GetAllTeams (GetAllTeamsRequest) returns (GetAllTeamsResponse);

    // Shop
    rpc ListAllItems (ListAllItemsRequest) returns (ListAllItemsResponse);
    rpc ViewItem (ViewItemRequest) returns (ViewItemResponse);
    rpc GetAllItems (GetAllItemsRequest) returns (GetAllItemsResponse);
    rpc BuyItem (BuyItemRequest) returns (BuyItemResponse);
    rpc SellItem (SellItemRequest) returns (SellItemResponse);

    // Prefix
    rpc BuyPrefix(BuyPrefixRequest) returns (BuyPrefixResponse);
    rpc EquipPrefix(EquipPrefixRequest) returns (EquipPrefixResponse);
    rpc GetAllPrefixes(GetAllPrefixRequest) returns (GetAllPrefixResponse);
    rpc ListAllPrefixes(ListAllPrefixRequest) returns (ListAllPrefixResponse);
    rpc GetOwnedPrefixes(GetOwnedPrefixRequest) returns (GetOwnedPrefixResponse);
    rpc ListOwnedPrefixes(ListOwnedPrefixRequest) returns (ListOwnedPrefixResponse);
    rpc GetCurrentPrefix(GetCurrentPrefixRequest) returns (GetCurrentPrefixResponse);
    rpc UnEquipPrefix(UnEquipPrefixRequest) returns (UnEquipPrefixResponse);

    // Player
    rpc PlayerDeath(PlayerDeathRequest) returns (PlayerDeathResponse);
    rpc PlayerKill(PlayerKillRequest) returns (PlayerKillResponse);
    rpc PlayerPlaceBlock(PlayerPlaceBlockRequest) returns (PlayerPlaceBlockResponse);
    rpc PlayerBreakBlock(PlayerBreakBlockRequest) returns (PlayerBreakBlockResponse);

    // Servers
    rpc GetAllServers(GetAllServersRequest) returns (GetAllServersResponse);
    rpc GetServer(GetServerRequest) returns (GetServerResponse);
    rpc ViewServer(ViewServerRequest) returns (ViewServerResponse);
    rpc ListAllServers(ListAllServersRequest) returns (ListAllServersResponse);
    rpc CreateServer(CreateServerRequest) returns (CreateServerResponse);
    rpc DeleteServer(DeleteServerRequest) returns (DeleteServerResponse);
    rpc LandingServer(LandingServerRequest) returns (LandingServerResponse);

    // Admin
    rpc CreateShopItem(CreateShopItemRequest) returns (CreateShopItemResponse);
    rpc DeleteShopItem(DeleteShopItemRequest) returns (DeleteShopItemResponse);
    rpc IncreaseCoins(IncreaseCoinsRequest) returns (IncreaseCoinsResponse);
    rpc CreatePrefix(CreatePrefixRequest) returns (CreatePrefixResponse);
    rpc DeletePrefix(DeletePrefixRequest) returns (DeletePrefixResponse);

    // Reports
    rpc ReportPlayer(ReportRequest) returns (ReportResponse);
    rpc GetAllReports(GetAllReportsRequest) returns (GetAllReportsResponse);
    rpc GetReport(GetReportRequest) returns (GetReportResponse);
    rpc ListAllReports(ListAllReportsRequest) returns (ListAllReportsResponse);
    rpc ViewReport(ViewReportRequest) returns (ViewReportResponse);
    rpc DeleteReport(DeleteReportRequest) returns (DeleteReportResponse);
    rpc DemotePerms(DemotePermsRequest) returns (DemotePermsResponse);
    rpc GetAllAdmins(GetAllAdminsRequest) returns (GetAllAdminsResponse);
    rpc GetAllModerators(GetAllModeratorsRequest) returns (GetAllModeratorsResponse);
    rpc ListAllAdmins(ListAllAdminsRequest) returns (ListAllAdminsResponse);
    rpc ListAllModerators(ListAllModeratorsRequest) returns (ListAllModeratorsResponse);

    // Redeem
    rpc RedeemCode(RedeemCodeRequest) returns (RedeemCodeResponse);
    rpc GetAllRedeemCodes(GetAllRedeemCodesRequest) returns (GetAllRedeemCodesResponse);
    rpc ListAllRedeemCodes(ListAllRedeemCodesRequest) returns (ListAllRedeemCodesResponse);
    rpc CreateRedeemCode(CreateRedeemCodeRequest) returns (CreateRedeemCodeResponse);
    rpc DeleteRedeemCode(DeleteRedeemCodeRequest) returns (DeleteRedeemCodeResponse);
    rpc ViewRedeemCode(ViewRedeemCodeRequest) returns (ViewRedeemCodeResponse);

    // Bug
    rpc Bug(BugRequest) returns (BugResponse);
    rpc DeleteBug(DeleteBugRequest) returns (DeleteBugResponse);
    rpc ListAllBugs(ListAllBugsRequest) returns (ListAllBugsResponse);
    rpc GetAllBugs(GetAllBugsRequest) returns (GetAllBugsResponse);
    rpc GetBug(GetBugRequest) returns (GetBugResponse);
    rpc ViewBug(ViewBugRequest) returns (ViewBugResponse);

    // Perms
    rpc PromoteAdminPerms(PromoteAdminPermsRequest) returns (PromoteAdminPermsResponse);
    rpc PromoteModeratorPerms(PromoteModeratorPermsRequest) returns (PromoteModeratorPermsResponse);

    // Scoreboard
    rpc GetScoreboard (GetScoreboardRequest) returns (GetScoreboardResponse);
    rpc ToggleScoreboard(ToggleScoreboardRequest) returns (ToggleScoreboardResponse);
    rpc GetScoreboardStatus(GetScoreboardStatusRequest) returns (GetScoreboardStatusResponse);

    // Messaging
    rpc GlobalChat(GlobalChatRequest) returns (GlobalChatResponse);
    rpc HindiChat(HindiChatRequest) returns (HindiChatResponse);
    rpc FriendChat(FriendChatRequest) returns (FriendChatResponse);
    rpc FriendChatAccept(FriendChatAcceptRequest) returns (FriendChatAcceptResponse);
    rpc TeamChat(TeamChatRequest) returns (TeamChatResponse);
    rpc ExitChat(ExitChatRequest) returns (ExitChatResponse);
}
