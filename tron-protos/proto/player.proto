syntax = "proto3";
option java_package = "com.tron.bridge";

package bridge;

message PlayerDeathRequest {
    string username = 1;
}

message PlayerDeathResponse {
   bool success = 1;
}

message PlayerKillRequest {
    string username = 1;
}

message PlayerKillResponse {
    bool success = 1;
}

message PlayerPlaceBlockRequest {
    string username = 1;
}

message PlayerPlaceBlockResponse {
    bool success = 1;
}

message PlayerBreakBlockRequest {
    string username = 1;
}

message PlayerBreakBlockResponse {
    bool success = 1;
}
