syntax = "proto3";
option java_package = "com.tron.bridge";

package bridge;
import "common.proto";

message PlayerLoginRequest {
    string username = 1;
    Edition edition = 2;
}

message PlayerLoginResponse {
    bool success = 1;
}

message PlayerLogoutRequest {
    string username = 1;
}

message PlayerLogoutResponse {
    bool success = 1;
}

message PlayerPostLoginRequest {
    string username = 1;
}

message PlayerPostLoginResponse {
    bool success = 1;
}
