syntax = "proto3";
option java_package = "com.tron.bridge";

package bridge;

message PromoteAdminPermsRequest {
    string username = 1;
    uint64 token = 2;
}

message PromoteAdminPermsResponse {
    bool success = 1;
}

message PromoteModeratorPermsRequest {
    string username = 1;
    string target = 2;
}

message PromoteModeratorPermsResponse {
    bool success = 1;
}

message DemotePermsRequest {
    string username = 1;
    string target = 2;
}

message DemotePermsResponse {
    bool success = 1;
}


message GetAllAdminsRequest {
    string username = 1;
}

message GetAllAdminsResponse {
    repeated string usernames = 1;
}

message GetAllModeratorsRequest {
    string username = 1;
}

message GetAllModeratorsResponse {
    repeated string usernames = 1;
}

message ListAllAdminsRequest {
    string username = 1;
}

message ListAllAdminsResponse {
    bool success = 1;
}

message ListAllModeratorsRequest {
    string username = 1;
}

message ListAllModeratorsResponse {
    bool success = 1;
}
