syntax = "proto3";
option java_package = "com.tron.bridge";

package bridge;

message GetBalanceRequest {
    string username = 1;
}

message GetBalanceResponse {
    uint64 balance = 1;
}

message TransferBalanceRequest {
    string sender = 1;
    string receiver = 2;
    uint64 amount = 3;
}

message TransferBalanceResponse {
    bool success = 1;
}
