name: Build and Release (aarch64 musl)

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-aarch64-musl:
    name: Build aarch64-unknown-linux-musl
    permissions:
      contents: write
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Install musl cross toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools gcc-aarch64-linux-gnu

      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: aarch64-unknown-linux-musl
          override: true

      - name: Build (aarch64 musl)
        env:
          CC_aarch64_unknown_linux_musl: aarch64-linux-gnu-gcc
        run: cargo build --release --target aarch64-unknown-linux-musl --package tron

      - name: Rename binary
        run: |
          mv target/aarch64-unknown-linux-musl/release/gradient \
             target/aarch64-unknown-linux-musl/release/gradient-aarch64-unknown-linux-musl

      - name: Create Release and Upload Artifact
        uses: softprops/action-gh-release@v1
        with:
          files: |
            target/aarch64-unknown-linux-musl/release/gradient-aarch64-unknown-linux-musl
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
