name: Build and Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-and-release:
    name: Build and Release
    permissions:
      contents: write
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_name: gradient

          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            binary_name: gradient

          - os: windows-latest
            target: x86_64-pc-windows-gnu
            binary_name: gradient.exe

          - os: macos-latest
            target: x86_64-apple-darwin
            binary_name: gradient

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install musl tools (aarch64 only)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools gcc-aarch64-linux-gnu

      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}
          override: true

      - name: Build (gnu)
        if: matrix.target != 'aarch64-unknown-linux-musl'
        run: cargo build --release --target ${{ matrix.target }} --package tron

      - name: Build (aarch64 musl)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        env:
          CC_aarch64_unknown_linux_musl: aarch64-linux-gnu-gcc
        run: |
          cargo build --release --target aarch64-unknown-linux-musl --package tron

      - name: Rename binary
        if: matrix.os != 'windows-latest'
        run: |
          mv target/${{ matrix.target }}/release/${{ matrix.binary_name }} \
             target/${{ matrix.target }}/release/gradient-${{ matrix.target }}

      - name: Rename binary (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          move target\${{ matrix.target }}\release\${{ matrix.binary_name }} \
               target\${{ matrix.target }}\release\gradient-${{ matrix.target }}.exe

      - name: Create Release and Upload Artifact
        uses: softprops/action-gh-release@v1
        with:
          files: |
            target/${{ matrix.target }}/release/gradient-${{ matrix.target }}${{ matrix.os == 'windows-latest' && '.exe' || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
