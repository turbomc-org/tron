name: Build aarch64-musl binary (with protoc)

on:
  workflow_dispatch:
  push:
    branches:
      - "**"

permissions:
  contents: read

jobs:
  build-aarch64-musl:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: aarch64-unknown-linux-musl

      - name: Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install protoc
        uses: arduino/setup-protoc@v3

      - name: Install zig
        run: |
          wget -q https://ziglang.org/download/0.13.0/zig-linux-x86_64-0.13.0.tar.xz
          tar xf zig-linux-x86_64-0.13.0.tar.xz
          sudo mv zig-linux-x86_64-0.13.0 /usr/local/zig
          echo "/usr/local/zig" >> $GITHUB_PATH

      - name: Install cargo-zigbuild
        run: cargo install cargo-zigbuild

      - name: Install cross binutils (for aarch64 strip)
        run: |
          sudo apt-get update
          sudo apt-get install -y binutils-aarch64-linux-gnu

      - name: Build release binary (--package tron)
        run: |
          cargo zigbuild --release --target aarch64-unknown-linux-musl --package tron

      - name: Strip binary
        run: |
          aarch64-linux-gnu-strip target/aarch64-unknown-linux-musl/release/tron

      - name: Prepare artifact
        run: |
          cp target/aarch64-unknown-linux-musl/release/tron tron-aarch64-linux-musl

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tron-aarch64-linux-musl
          path: tron-aarch64-linux-musl
          if-no-files-found: error
