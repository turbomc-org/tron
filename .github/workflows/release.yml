name: Build and Release (aarch64 musl)

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-aarch64-musl:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Install aarch64 musl cross toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y wget xz-utils
          wget https://more.musl.cc/11.2.1/aarch64-linux-musl-cross.tgz
          tar -xzf aarch64-linux-musl-cross.tgz
          echo "$PWD/aarch64-linux-musl-cross/bin" >> $GITHUB_PATH

      - name: Install Rust target
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: aarch64-unknown-linux-musl
          override: true

      - name: Build
        env:
          CC_aarch64_unknown_linux_musl: aarch64-linux-musl-gcc
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: aarch64-linux-musl-gcc
        run: cargo build --release --target aarch64-unknown-linux-musl --package tron

      - name: Rename binary
        run: |
          mv target/aarch64-unknown-linux-musl/release/gradient \
             target/aarch64-unknown-linux-musl/release/gradient-aarch64-unknown-linux-musl

      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          files: target/aarch64-unknown-linux-musl/release/gradient-aarch64-unknown-linux-musl
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
