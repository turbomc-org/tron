syntax = "proto3";
option java_package = "com.tron.bridge";

package bridge;

message GetLeaderboardRequest {
    enum SortBy {
        KILLS = 0;
        DEATHS = 1;
        KDR = 2;
        COINS = 3;
    }
    SortBy sorting = 1;
}

message GetLeaderboardResponse {
    map<string, uint64> players = 1;
}

message OverallLeaderboardRequest {}
message OverallLeaderboardResponse {
    map<string, uint64> leaderboard = 1;
}

message CoinsLeaderboardRequest {}
message CoinsLeaderboardResponse {
    map<string, uint64> leaderboard = 1;
}

message TeamsLeaderboardRequest {}
message TeamsLeaderboardResponse {
    map<string, uint64> leaderboard = 1;
}

message KdaLeaderboardRequest {}
message KdaLeaderboardResponse {
    map<string, float> leaderboard = 1;
}

message DeathsLeaderboardRequest {}
message DeathsLeaderboardResponse {
    map<string, uint64> leaderboard = 1;
}

message KillsLeaderboardRequest {}
message KillsLeaderboardResponse {
    map<string, uint64> leaderboard = 1;
}
