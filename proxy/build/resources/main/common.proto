syntax = "proto3";
option java_package = "com.tron.bridge";

package bridge;

message ShopItem {
  uint64 id = 1;
  string type_id = 2;
  repeated string enchantments = 3;
  string name = 4;
  string description = 5;
  string category = 6;
  uint64 buy_price = 7;
  uint64 sell_price = 8;
  Rarity rarity = 9;
}

enum Rarity {
  COMMON = 0;
  UNCOMMON = 1;
  RARE = 2;
  EPIC = 3;
  LEGENDARY = 4;
}

message PartialPrefix {
    string text = 1;
    string color = 2;
    uint64 price = 3;
}
